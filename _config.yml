# Site settings
# Update these to taste - title/description show up in the header, browser tab, and RSS feed.
title: "Garden Variety"
subtitle: "The crossroads between personal study and a desire for better archival than a bunch of notebooks."
name: "Jonathan"
description: >-
  The stream of consciousness thoughts and personal study of the Bible along with finished resources that represent more complete thoughts.
url: "https://jbesse.me"
baseurl: ""
locale: "en-US"
repository: "Jrbesse/jrbesse.github.io"

# Theme (loaded directly from GitHub - no local copy needed)
remote_theme: "mmistakes/minimal-mistakes@4.26.2"

# Available skins - swap the value below to change the site's look:
#   default, air, aqua, contrast, dark, dirt, neon, mint, plum, sunrise
minimal_mistakes_skin: "mint"

# Plugins (all on GitHub Pages' supported plugin list)
plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-feed

# Build settings
markdown: kramdown
highlighter: rouge
search: true

# Pagination for the home page post feed
paginate: 5
paginate_path: /page:num/

# Author / sidebar info shown on posts
author:
  name: "Jonathan"
  bio: "Tomorrow's questions, today!"
  # avatar: "/assets/images/avatar.jpg"
  # links:
  #   - label: "Email"
  #     icon: "fas fa-fw fa-envelope-square"
  #     url: "mailto:you@example.com"

footer:
  links: []

# Custom collection for "finished" resources, separate from the blog feed
collections:
  resources:
    output: true
    permalink: /resources/:path/

# Front matter defaults
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: false
      share: false
      related: true
  - scope:
      path: ""
      type: resources
    values:
      layout: single
      author_profile: false
      toc: true
      toc_sticky: true

# Exclude from processing
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - vendor
  - examplept1.md
  - examplept2.md
  - examplept3.md
  - sampleexample.md
